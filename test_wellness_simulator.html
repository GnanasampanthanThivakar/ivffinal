<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wellness Watch Simulator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #0F172A; 
            color: #E2E8F0; 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: #1E293B;
            border-radius: 24px;
            padding: 32px;
            width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        h1 { 
            font-size: 20px; 
            color: #2DD4BF; 
            margin-bottom: 4px;
        }
        .subtitle { 
            font-size: 12px; 
            color: #64748B; 
            margin-bottom: 24px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .status {
            background: #0F766E22;
            border: 1px solid #0D9488;
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #2DD4BF;
        }
        .status.error {
            background: #EF444422;
            border-color: #EF4444;
            color: #FCA5A5;
        }
        .status.success {
            background: #10B98122;
            border-color: #10B981;
            color: #6EE7B7;
        }
        .field {
            margin-bottom: 16px;
        }
        label {
            display: block;
            font-size: 11px;
            color: #94A3B8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }
        input, select {
            width: 100%;
            padding: 10px 14px;
            background: #0F172A;
            border: 1px solid #334155;
            border-radius: 10px;
            color: #E2E8F0;
            font-size: 15px;
            outline: none;
        }
        input:focus, select:focus {
            border-color: #0D9488;
        }
        .row { display: flex; gap: 12px; }
        .row .field { flex: 1; }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #0F766E, #0D9488);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        button.stop {
            background: linear-gradient(135deg, #991B1B, #EF4444);
            margin-top: 12px;
        }
        .log {
            margin-top: 16px;
            max-height: 120px;
            overflow-y: auto;
            font-size: 11px;
            color: #64748B;
            background: #0F172A;
            border-radius: 8px;
            padding: 10px;
        }
        .log p { margin-bottom: 4px; }
        .log .ok { color: #10B981; }
        .log .err { color: #EF4444; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⌚ Wellness Watch Simulator</h1>
        <p class="subtitle">Simulates smartwatch BLE data for testing</p>

        <div id="status" class="status">Ready — Configure values and click Start</div>

        <div class="row">
            <div class="field">
                <label>Heart Rate (bpm)</label>
                <input type="number" id="hr" value="75" min="50" max="120">
            </div>
            <div class="field">
                <label>HRV (ms)</label>
                <input type="number" id="hrv" value="48" min="10" max="100">
            </div>
        </div>

        <div class="row">
            <div class="field">
                <label>Sleep (hours)</label>
                <input type="number" id="sleep" value="7.5" step="0.5" min="3" max="12">
            </div>
            <div class="field">
                <label>Steps</label>
                <input type="number" id="steps" value="7500" min="0" max="30000">
            </div>
        </div>

        <div class="field">
            <label>Stress Level</label>
            <select id="stress">
                <option value="Low" selected>Low (Calm)</option>
                <option value="Medium">Medium (Elevated)</option>
                <option value="High">High (Stressed)</option>
            </select>
        </div>

        <button onclick="startSimulator()">▶ Start Sending Data</button>
        <button class="stop" onclick="stopSimulator()">⏹ Stop</button>

        <div id="log" class="log"></div>
    </div>

    <script>
        const API_BASE = 'http://127.0.0.1:8000';
        let intervalId = null;
        let sendCount = 0;

        function log(msg, type = '') {
            const el = document.getElementById('log');
            const p = document.createElement('p');
            p.className = type;
            p.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            el.prepend(p);
        }

        function setStatus(msg, type = '') {
            const el = document.getElementById('status');
            el.textContent = msg;
            el.className = 'status ' + type;
        }

        async function sendData() {
            const hr = parseFloat(document.getElementById('hr').value) + (Math.random() * 4 - 2);
            const hrv = parseFloat(document.getElementById('hrv').value) + (Math.random() * 6 - 3);
            const sleep = parseFloat(document.getElementById('sleep').value);
            const steps = parseInt(document.getElementById('steps').value) + Math.floor(Math.random() * 200);
            const stress = document.getElementById('stress').value;

            const stressPercent = stress === 'Low' ? 20 : stress === 'Medium' ? 50 : 80;

            const payload = {
                userId: "user_1",
                dateTimeISO: new Date().toISOString(),
                HR_sensor: Math.round(hr),
                Heart_Rate_Variability: Math.round(hrv),
                Sleep_Hours: sleep,
                steps_sensor: steps
            };

            try {
                const res = await fetch(`${API_BASE}/wellness/predict`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await res.json();
                sendCount++;
                
                log(`#${sendCount} Sent HR:${Math.round(hr)} HRV:${Math.round(hrv)} Sleep:${sleep} Steps:${steps} → Stress: ${data.currentStressLevel || stress}`, 'ok');
                setStatus(`✅ Sending data... (${sendCount} packets sent) — Stress: ${data.currentStressLevel || stress}`, 'success');
            } catch (err) {
                log(`Error: ${err.message}`, 'err');
                setStatus(`❌ Backend not reachable — is it running on port 8000?`, 'error');
            }
        }

        function startSimulator() {
            if (intervalId) {
                log('Already running');
                return;
            }
            sendCount = 0;
            setStatus('🔄 Starting simulator...', '');
            log('Simulator started — sending every 3 seconds');
            
            // Send immediately then every 3 seconds
            sendData();
            intervalId = setInterval(sendData, 3000);
        }

        function stopSimulator() {
            if (intervalId) {
                clearInterval(intervalId);
                intervalId = null;
                setStatus(`⏹ Stopped after ${sendCount} packets`, '');
                log('Simulator stopped');
            }
        }
    </script>
</body>
</html>
